<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Exo VOP</title>
  <link rel="stylesheet" href="../asset/css/global.css" />
  <link rel="stylesheet" href="../asset/css/admin.css" />
  <link rel="icon" type="image/png" sizes="32x32" href="../media/logo-exo-vop(nobackground).png" />
</head>
<body>
  <div id="cursor"></div><div id="cursor-ring"></div>
  <canvas id="stars-canvas"></canvas>

  <div class="admin-login-page">
    <div class="login-card">
      <div class="login-header">
        <div class="login-logo">🔐</div>
        <h1 class="login-title">ADMIN</h1>
        <p class="login-subtitle">Panneau d'administration — Exo VOP</p>
      </div>
      <form class="login-form" id="login-form" onsubmit="adminLogin(event)">
        <div id="login-error" class="login-error"></div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="admin-login-email" placeholder="admin@exoVOP.com" required autocomplete="email" />
        </div>
        <div class="form-group">
          <label>Mot de passe</label>
          <input type="password" id="admin-login-password" placeholder="••••••••" required autocomplete="current-password" />
        </div>
        <button type="submit" class="btn-login" id="btn-do-login">Connexion</button>
      </form>
      <p style="text-align:center;margin-top:22px;font-size:.75rem;color:var(--text-dim)">
        <a href="/index" style="color:var(--cyan);text-decoration:none;">← Retour au site</a>
      </p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../asset/js/config.js"></script>
  <script src="../asset/js/global.js"></script>
  <script src="../asset/js/admin.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      if (!db) return;
      const { data: { session } } = await db.auth.getSession();
      if (session) window.location.href = '/admin/dashboard';
    });
  </script>
</body>
</html>
